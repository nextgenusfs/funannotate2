[workspace]
name = "funannotate2"
version = "0.1.0"
description = "funannotate2 runtime (Docker/HPC) — assembled with pixi"
authors = ["Jon Palmer <nextgenusfs@gmail.com>"]
channels = ["conda-forge", "bioconda"]
platforms = ["linux-64"]

[dependencies]
python = "3.11.*"
pip = "*"

# CLI / binary tools from bioconda
augustus = "3.5.0.*"
minimap2 = "*"
miniprot = "*"
snap = "*"
glimmerhmm = "*"
diamond = "*"
trnascan-se = "*"
table2asn = "*"

# funannotate2 python deps available via bioconda / conda-forge
gfftk = ">=26.2.12"
gapmm2 = ">=25.8.12"
buscolite = ">=26.4.22"
pyhmmer = ">=0.12.0"
pyfastx = ">=2.0.0"
gb-io = ">=0.3.2"
mappy = "*"

# general python + scientific libs from conda-forge
natsort = "*"
numpy = "*"
requests = "*"
json-repair = "*"
psutil = "*"
h5py = "*"
tensorflow = ">=2.10,<2.16"

# runtime utilities
tini = "*"
ca-certificates = "*"

[pypi-dependencies]
# local funannotate2 source (built from repo)
funannotate2 = { path = ".", editable = false }
# pure-pypi packages
"funannotate2-addons" = "*"
helixerlite = "*"
annorefine = ">=2026.2.9"
# pytantan: bioconda lags at 0.1.3; pull 0.1.4+ from PyPI
pytantan = ">=0.1.4"

