[workspace]
name = "funannotate2"
version = "0.1.0"
description = "funannotate2 runtime (Docker/HPC) — assembled with pixi"
authors = ["Jon Palmer <nextgenusfs@gmail.com>"]
channels = ["conda-forge", "bioconda"]
platforms = ["linux-64", "osx-arm64"]

[dependencies]
python = "3.11.*"
pip = "*"

# CLI / binary tools from bioconda
# NOTE: augustus is intentionally NOT installed via conda. The bioconda
# augustus binary targets a modern x86_64 microarch (AVX2/BMI2) and SIGILLs
# under Rosetta 2 on Apple Silicon and on pre-Haswell CPUs. The Docker image
# installs augustus from Ubuntu apt instead (generic-baseline build, runs
# everywhere). On native macOS development the funannotate2 CLI is exercised
# via the dockerized image, so augustus on osx-arm64 is not needed here.
# NOTE: glimmerhmm has the same root cause (bioconda compiles with
# -march=x86-64-v3 → SIGILL under Rosetta 2). It is NOT in Ubuntu apt, so
# the Docker image compiles it from source with a generic baseline and
# layers it onto PATH ahead of the pixi env (see Dockerfile). The bioconda
# entry below is kept anyway: on osx-arm64 it provides the arm64-native
# binary for outside-docker dev work, and inside the image it acts as a
# shadowed fallback if /opt/glimmerhmm is somehow missing.
minimap2 = "*"
miniprot = "*"
snap = "*"
glimmerhmm = "*"
diamond = "*"
trnascan-se = "*"

# funannotate2 python deps available via bioconda / conda-forge
# NOTE: buscolite is installed via pypi (see [pypi-dependencies]) because its
# bioconda recipe pulls in augustus as a hard dependency, which we deliberately
# avoid (see comment above). The pypi package has no such dep.
gapmm2 = ">=26.5.22"
pyhmmer = ">=0.12.0"
pyfastx = ">=2.0.0"
gb-io = ">=0.3.2"
mappy = "*"

# general python + scientific libs from conda-forge
natsort = "*"
numpy = "*"
requests = "*"
json-repair = "*"
psutil = "*"
h5py = "*"
tensorflow = ">=2.10,<2.16"

# runtime utilities
ca-certificates = "*"
pytest = "*"

[target.linux-64.dependencies]
tini = "*"
table2asn = "*"

[pypi-dependencies]
gfftk = ">=26.5.22"
# local funannotate2 source (built from repo)
funannotate2 = { path = ".", editable = false }
# pure-pypi packages
"funannotate2-addons" = "*"
helixerlite = "*"
annorefine = ">=2026.2.9"
# buscolite via pypi to avoid its bioconda recipe's augustus dependency
buscolite = ">=26.6.21"
# pytantan: built from the nextgenusfs/pytantan fork, which adds a
# `PYTANTAN_DISABLE_SIMD` CMake option and a `PYTANTAN_SIMD` env-var override.
# The PyPI wheels ship with AVX2 enabled and SIGILL under Rosetta 2 on Apple
# Silicon (and on pre-Haswell x86_64); building from source with
# `CMAKE_ARGS=-DPYTANTAN_DISABLE_SIMD=ON` (set in the Dockerfile) produces a
# generic-only build that runs everywhere.
pytantan = { git = "https://github.com/nextgenusfs/pytantan.git", rev = "90818ff695c844cefd5f42eb3baa297263565f21" }


[tasks]
install-mac-table2asn = "curl -O https://ftp.ncbi.nlm.nih.gov/asn1-converters/by_program/table2asn/mac.table2asn.gz && gunzip -f mac.table2asn.gz && mv mac.table2asn $CONDA_PREFIX/bin/table2asn && chmod 755 $CONDA_PREFIX/bin/table2asn"