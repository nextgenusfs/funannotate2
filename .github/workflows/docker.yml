name: Build and Publish Docker Image

on:
  push:
    tags: ['v*']
  pull_request:
    paths:
      - 'Dockerfile'
      - '.dockerignore'
      - 'pixi.toml'
      - 'pixi.lock'
      - '.github/workflows/docker.yml'
  workflow_dispatch:
    inputs:
      push:
        description: 'Push image to registries (otherwise build only)'
        type: boolean
        default: true

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

jobs:
  build:
    name: Build funannotate2 image (linux/amd64)
    runs-on: ubuntu-latest
    timeout-minutes: 240
    env:
      DOCKERHUB_ENABLED: ${{ secrets.DOCKERHUB_TOKEN != '' && 'true' || 'false' }}

    steps:
      - name: Free disk space on runner
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: false
          swap-storage: true

      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        if: ${{ github.event_name != 'pull_request' && env.DOCKERHUB_ENABLED == 'true' }}
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ghcr.io/nextgenusfs/funannotate2
            name=docker.io/nextgenusfs/funannotate2,enable=${{ env.DOCKERHUB_ENABLED == 'true' }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,format=short
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=raw,value=latest,enable=${{ github.event_name == 'workflow_dispatch' && github.ref == format('refs/heads/{0}', github.event.repository.default_branch) }}

      # Build the image into the local Docker daemon first (no registry push
      # yet) so we can smoke-test it before publishing. The cache-to step makes
      # the subsequent push-from-cache step essentially a no-op rebuild.
      - name: Build image (load to local Docker daemon)
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: false
          load: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false

      # Smoke-test the built image against a CPU model that lacks AVX2, to
      # reproduce the Rosetta 2 / non-AVX2 x86_64 environment some users run on.
      # We use qemu-user-static with `-cpu Westmere` (pre-AVX); any AVX/AVX2
      # instruction executed by pytantan will raise SIGILL and fail the job.
      - name: Install qemu-user-static
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends qemu-user-static

      - name: Resolve test image tag
        id: testimg
        run: |
          tag=$(printf '%s\n' "${{ steps.meta.outputs.tags }}" | head -n1)
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"

      - name: Smoke test pytantan under non-AVX2 CPU emulation (Westmere)
        run: |
          set -euxo pipefail
          docker run --rm \
            -v /usr/bin/qemu-x86_64-static:/usr/bin/qemu-x86_64-static:ro \
            --entrypoint /usr/bin/qemu-x86_64-static \
            "${{ steps.testimg.outputs.tag }}" \
            -cpu Westmere \
            /app/.pixi/envs/default/bin/python -c \
              "import pytantan; from pytantan import Alphabet, RepeatFinder, default_scoring_matrix; print('pytantan smoke OK', pytantan.__version__)"

      # Only publish to the registries after the smoke test has passed.
      # The second build is a cache hit on every layer; it just exports the
      # already-built image to the registry.
      - name: Push image to registries
        if: ${{ github.event_name != 'pull_request' && (github.event_name != 'workflow_dispatch' || inputs.push) }}
        id: push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          provenance: false

      - name: Image digest
        if: steps.push.outputs.digest != ''
        run: echo "Digest=${{ steps.push.outputs.digest }}"

